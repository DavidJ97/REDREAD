name: RedRead Auto-Validate

on:
  # Se déclenche après le pipeline principal (toutes les heures + 15 min)
  schedule:
    - cron: '15 * * * *'
  workflow_dispatch:

jobs:
  auto-validate:
    name: Validation automatique des analyses en attente
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: redread/package-lock.json

      - name: Installer les dépendances
        working-directory: redread
        run: npm ci

      - name: Auto-validation des analyses non validées
        working-directory: redread
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ADMIN_UID: ${{ secrets.ADMIN_UID }}
        run: node scripts/auto_validate.js
