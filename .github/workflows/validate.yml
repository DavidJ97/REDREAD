name: RedRead Auto-Validate

on:
  # Se déclenche 5 min après le pipeline (toutes les 15 min décalé de 5)
  schedule:
    - cron: '5,20,35,50 * * * *'
  workflow_dispatch:

jobs:
  auto-validate:
    name: Validation automatique des analyses en attente
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Installer les dépendances
        run: npm ci

      - name: Auto-validation des analyses non validées
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ADMIN_UID: ${{ secrets.ADMIN_UID }}
        run: node scripts/auto_validate.js
